query Query(
  $enterprise:String!,
  $first:Int=100,
  $after:String,
) {
  enterprise(slug:$enterprise) {
    ownerInfo {
      pendingMemberInvitations(first:$first,after:$after) {
        pageInfo {
          endCursor
          hasNextPage
        }
        nodes {
          email
          id
          invitee {
            databaseId
            email
            id
            login
          }
          inviterActor {
            databaseId
            email
            id
            login
          }
          organization {
            databaseId
            id
            login
          }
        }
      }
    }
  }
}