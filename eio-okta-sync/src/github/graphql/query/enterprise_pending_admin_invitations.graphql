query Query(
  $enterpriseSlug:String!,
  $first:Int=100,
  $after:String,
) {
  enterprise(slug:$enterpriseSlug) {
    ownerInfo {
      pendingAdminInvitations(first:$first,after:$after) {
        pageInfo {
          endCursor
          hasNextPage
        }
        nodes {
          email
          enterprise {
            databaseId
            id
            slug
          }
          id
          invitee {
            databaseId
            email
            id
            login
          }
          inviter {
            databaseId
            email
            id
            login
          }
        }
      }
    }
  }
}
