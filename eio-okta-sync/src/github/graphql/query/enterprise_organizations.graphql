query Query(
  $enterpriseSlug:String!,
  $first:Int=100,
  $after:String,
) {
  enterprise(slug:$enterpriseSlug) {
    organizations(first:$first,after:$after) {
      pageInfo {
        endCursor
        hasNextPage
      }
      nodes {
        databaseId
        id
        login
      }
    }
  }
}
